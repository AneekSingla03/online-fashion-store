<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Checkout – StyleHub</title>
  <link rel="icon" type="image/svg+xml"
    href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='8' fill='%23c0392b'/%3E%3Ctext x='50%25' y='50%25' dominant-baseline='central' text-anchor='middle' font-family='Georgia%2C serif' font-size='20' font-weight='700' fill='%23ffffff'%3ES%3C/text%3E%3C/svg%3E">
  <link rel="stylesheet" href="css/style.css">
  <style>
    .checkout-layout {
      display: grid;
      grid-template-columns: 1fr 380px;
      gap: 28px;
      align-items: start;
    }

    .checkout-card {
      background: var(--white);
      border-radius: var(--radius);
      border: 1.5px solid var(--border);
      padding: 28px;
      margin-bottom: 18px;
    }

    .checkout-card h3 {
      font-family: var(--font-display);
      font-size: 20px;
      margin-bottom: 20px;
      padding-bottom: 14px;
      border-bottom: 1px solid var(--border);
    }

    .form-grid-2 {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 14px;
    }

    .pay-option {
      border: 1.5px solid var(--border);
      border-radius: var(--radius-sm);
      padding: 14px 16px;
      display: flex;
      align-items: center;
      gap: 12px;
      cursor: pointer;
      transition: var(--transition);
      margin-bottom: 10px;
    }

    .pay-option:hover,
    .pay-option.selected {
      border-color: var(--ink);
      background: var(--sand);
    }

    .pay-option input {
      accent-color: var(--ink);
    }

    .steps {
      display: flex;
      gap: 0;
      margin-bottom: 28px;
    }

    .step {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 13px;
      font-weight: 500;
      color: var(--muted);
    }

    .step-num {
      width: 26px;
      height: 26px;
      border-radius: 50%;
      border: 1.5px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 12px;
      font-weight: 700;
    }

    .step.active .step-num {
      background: var(--ink);
      color: #fff;
      border-color: var(--ink);
    }

    .step.active {
      color: var(--ink);
    }

    .step-sep {
      width: 40px;
      height: 1px;
      background: var(--border);
      margin: 0 8px;
    }

    @media(max-width:900px) {
      .checkout-layout {
        grid-template-columns: 1fr;
      }

      .form-grid-2 {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>

<body>
  <div id="navbar-mount"></div>
  <div class="page-banner">
    <div class="container">
      <div class="page-banner-title">Checkout</div>
    </div>
  </div>
  <section class="section">
    <div class="container">
      <div class="steps">
        <div class="step active"><span class="step-num">1</span>Shipping</div>
        <div class="step-sep"></div>
        <div class="step"><span class="step-num">2</span>Payment</div>
        <div class="step-sep"></div>
        <div class="step"><span class="step-num">3</span>Confirm</div>
      </div>
      <div class="checkout-layout">
        <div>
          <!-- SHIPPING -->
          <div class="checkout-card">
            <h3>Shipping Address</h3>
            <div class="form-grid-2">
              <div class="form-group"><label class="form-label">First Name</label><input class="form-input"
                  id="co-fname" placeholder="Rahul"></div>
              <div class="form-group"><label class="form-label">Last Name</label><input class="form-input" id="co-lname"
                  placeholder="Sharma"></div>
            </div>
            <div class="form-group"><label class="form-label">Email Address</label><input class="form-input"
                id="co-email" type="email" placeholder="rahul@example.com"></div>
            <div class="form-group"><label class="form-label">Phone Number</label><input class="form-input"
                id="co-phone" placeholder="+91 98765 43210"></div>
            <div class="form-group"><label class="form-label">Street Address</label><input class="form-input"
                id="co-addr" placeholder="123, MG Road, Apartment 4B"></div>
            <div class="form-grid-2">
              <div class="form-group"><label class="form-label">City</label><input class="form-input" id="co-city"
                  placeholder="Mumbai"></div>
              <div class="form-group"><label class="form-label">PIN Code</label><input class="form-input" id="co-pin"
                  placeholder="400001"></div>
            </div>
            <div class="form-group">
              <label class="form-label">State</label>
              <select class="form-select" id="co-state">
                <option value="">Select State</option>
                <option>Maharashtra</option>
                <option>Karnataka</option>
                <option>Tamil Nadu</option>
                <option>Delhi</option>
                <option>Gujarat</option>
                <option>Rajasthan</option>
                <option>West Bengal</option>
                <option>Uttar Pradesh</option>
                <option>Punjab</option>
              </select>
            </div>
          </div>
          <!-- PAYMENT -->
          <div class="checkout-card">
            <h3>Payment Method</h3>
            <div class="pay-option selected" onclick="selectPay(this,'upi')">
              <input type="radio" name="pay" value="upi" checked>
              <div>
                <div style="font-weight:600;font-size:14px;">UPI Payment</div>
                <div style="font-size:12px;color:var(--muted);">Google Pay, PhonePe, Paytm</div>
              </div>
              <span style="margin-left:auto;font-size:18px;">📱</span>
            </div>
            <div class="pay-option" onclick="selectPay(this,'card')">
              <input type="radio" name="pay" value="card">
              <div>
                <div style="font-weight:600;font-size:14px;">Credit / Debit Card</div>
                <div style="font-size:12px;color:var(--muted);">Visa, Mastercard, RuPay</div>
              </div>
              <span style="margin-left:auto;font-size:18px;">💳</span>
            </div>
            <div class="pay-option" onclick="selectPay(this,'cod')">
              <input type="radio" name="pay" value="cod">
              <div>
                <div style="font-weight:600;font-size:14px;">Cash on Delivery</div>
                <div style="font-size:12px;color:var(--muted);">Pay when you receive</div>
              </div>
              <span style="margin-left:auto;font-size:18px;">💵</span>
            </div>
            <div id="card-fields" style="display:none;margin-top:16px;">
              <div class="form-group"><label class="form-label">Card Number</label><input class="form-input"
                  placeholder="1234 5678 9012 3456" maxlength="19" oninput="formatCard(this)"></div>
              <div class="form-grid-2">
                <div class="form-group"><label class="form-label">Expiry</label><input class="form-input"
                    placeholder="MM / YY"></div>
                <div class="form-group"><label class="form-label">CVV</label><input class="form-input" placeholder="•••"
                    maxlength="3" type="password"></div>
              </div>
            </div>
          </div>
        </div>
        <!-- ORDER SUMMARY -->
        <div class="order-summary" style="position:sticky;top:80px;" id="co-summary">
          <div class="order-summary-title">Order Summary</div>
          <div id="co-items" style="margin-bottom:14px;padding-bottom:14px;border-bottom:1px solid var(--border);">
          </div>
          <div class="order-row"><span>Subtotal</span><span id="co-sub"></span></div>
          <div class="order-row"><span>Discount (5%)</span><span id="co-disc" style="color:#2e7d32;"></span></div>
          <div class="order-row"><span>Shipping</span><span id="co-ship"></span></div>
          <div class="order-row total"><span>Total</span><span id="co-total"></span></div>
          <button class="btn btn-secondary btn-full btn-lg" style="margin-top:20px;" onclick="placeOrder()">Place Order
            →</button>
          <div style="margin-top:14px;font-size:12px;color:var(--muted);text-align:center;">🔒 100% Secure &amp;
            Encrypted Payment</div>
        </div>
      </div>
    </div>
  </section>
  <div id="footer-mount"></div>
  <script src="js/main.js"></script>
  <script src="js/cart.js"></script>
  <script>
    document.getElementById('navbar-mount').innerHTML = buildNavbar('');
    document.getElementById('footer-mount').innerHTML = buildFooter();

    const cart = getCart();
    const subtotal = getCartTotal();
    const discount = Math.round(subtotal * 0.05);
    const shipping = subtotal >= 999 ? 0 : 99;
    const total = subtotal - discount + shipping;

    document.getElementById('co-items').innerHTML = cart.map(item =>
      `<div style="display:flex;justify-content:space-between;font-size:13px;margin-bottom:8px;">
    <span>${item.name} (${item.size}) × ${item.qty}</span>
    <span style="font-weight:600;">₹${(item.price * item.qty).toLocaleString()}</span>
  </div>`).join('');

    document.getElementById('co-sub').textContent = `₹${subtotal.toLocaleString()}`;
    document.getElementById('co-disc').textContent = `- ₹${discount.toLocaleString()}`;
    document.getElementById('co-ship').innerHTML = shipping === 0 ? '<span style="color:#2e7d32;">FREE</span>' : `₹${shipping}`;
    document.getElementById('co-total').textContent = `₹${total.toLocaleString()}`;

    function selectPay(el, type) {
      document.querySelectorAll('.pay-option').forEach(o => o.classList.remove('selected'));
      el.classList.add('selected');
      el.querySelector('input').checked = true;
      document.getElementById('card-fields').style.display = type === 'card' ? 'block' : 'none';
    }
    function formatCard(input) {
      let v = input.value.replace(/\D/g, '').substring(0, 16);
      input.value = v.replace(/(.{4})/g, '$1 ').trim();
    }
    function placeOrder() {
      const req = ['co-fname', 'co-lname', 'co-email', 'co-phone', 'co-addr', 'co-city', 'co-pin', 'co-state'];
      for (const id of req) {
        if (!document.getElementById(id).value.trim()) {
          showToast('⚠️ Please fill all shipping fields.');
          document.getElementById(id).focus();
          return;
        }
      }
      saveCart([]);
      const orderId = 'SH' + Date.now().toString().slice(-6);
      localStorage.setItem('sh_last_order', JSON.stringify({ orderId, total, items: cart.length }));
      window.location.href = 'order-success.html';
    }
  </script>
</body>

</html>
