<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Wishlist – StyleHub</title>
  <link rel="icon" type="image/svg+xml"
    href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='8' fill='%23c0392b'/%3E%3Ctext x='50%25' y='50%25' dominant-baseline='central' text-anchor='middle' font-family='Georgia%2C serif' font-size='20' font-weight='700' fill='%23ffffff'%3ES%3C/text%3E%3C/svg%3E">
  <link rel="stylesheet" href="css/style.css">
</head>

<body>
  <div id="navbar-mount"></div>
  <div class="page-banner">
    <div class="container">
      <div class="breadcrumb" style="color:rgba(255,255,255,0.5);">
        <a href="index.html" style="color:rgba(255,255,255,0.5);">Home</a><span class="breadcrumb-sep">›</span>
        <span style="color:#fff;">Wishlist</span>
      </div>
      <div class="page-banner-title">My <em style="color:var(--rust);">Wishlist</em></div>
    </div>
  </div>
  <section class="section">
    <div class="container">
      <div id="wishlist-content"></div>
    </div>
  </section>
  <div id="footer-mount"></div>
  <script src="js/main.js"></script>
  <script>
    document.getElementById('navbar-mount').innerHTML = buildNavbar('wishlist.html');
    document.getElementById('footer-mount').innerHTML = buildFooter();

    function renderWishlist() {
      const wish = getWishlist();
      const container = document.getElementById('wishlist-content');
      if (!wish.length) {
        container.innerHTML = `<div class="empty-state"><div class="empty-state-icon">♡</div><h3>Your wishlist is empty</h3><p>Save items you love for later.</p><a href="products.html" class="btn btn-primary btn-lg">Start Browsing</a></div>`;
        return;
      }
      const wishProducts = PRODUCTS.filter(p => wish.includes(p.id));
      container.innerHTML = `
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:24px;">
      <p style="color:var(--muted);font-size:14px;">${wishProducts.length} saved item${wishProducts.length !== 1 ? 's' : ''}</p>
      <button onclick="if(confirm('Clear wishlist?')){localStorage.removeItem('sh_wish');renderWishlist();}" class="btn btn-ghost btn-sm">Clear All</button>
    </div>
    <div class="product-grid">${wishProducts.map(p => productCardHTML(p)).join('')}</div>`;
    }
    renderWishlist();
  </script>
</body>

</html>
